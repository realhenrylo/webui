services:
  guidely-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: haoyu99/noumena_guidely:main
    container_name: guidely-webui
    volumes:
      - /mnt/dev-data/guidely-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3200}:8080
    environment:
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_NAME=Guidely'
      - 'HF_ENDPOINT=https://hf-mirror.com'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped